name: Plumber Compliance Scanner
on:
  push:
    branches: [main]   # scope to the default branch so a PR push isn't scanned twice
  pull_request: null

permissions:
  contents: read
  security-events: write   # required to upload SARIF to Code Scanning

jobs:
  plumber:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: getplumber/plumber@5ffae3c0c0968875259829e80992863963b3c2d4   # v0.3.27
        with:
          threshold: 80
