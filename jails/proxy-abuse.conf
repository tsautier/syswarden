JAIL_NAME="proxy-abuse"
JAIL_LOGPATHS="/var/log/nginx/access.log /var/log/apache2/access.log /var/log/httpd/access_log"
JAIL_REGEX="^([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+)[ \t]+.*\"(CONNECT|TRACE|TRACK|PROPFIND|MKCOL|COPY|MOVE|LOCK|UNLOCK|GET http|POST http).*"
JAIL_MAXRETRY=1
JAIL_BANTIME="172800s"
JAIL_MITRE_ID="T1090"
JAIL_MITRE_NAME="Connection Proxy"