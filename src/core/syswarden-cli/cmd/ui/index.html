<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SysWarden Web-TUI</title>
    <link rel="stylesheet" href="assets/xterm.css" />
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #terminal-container {
            width: 100%;
            height: 100%;
            padding: 10px;
            box-sizing: border-box;
        }
        .xterm-viewport {
            overflow-y: hidden !important;
        }
    </style>
</head>
<body>
    <div id="terminal-container"></div>
    <script src="assets/xterm.js"></script>
    <script src="assets/xterm-addon-fit.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('terminal-container');
            
            const term = new Terminal({
                cursorBlink: true,
                theme: {
                    background: '#000000',
                    foreground: '#ffffff'
                },
                fontFamily: '"Fira Code", "Consolas", monospace',
                fontSize: 14,
            });

            const fitAddon = new FitAddon.FitAddon();
            term.loadAddon(fitAddon);
            term.open(container);
            fitAddon.fit();

            // Extract token from URL
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            if (!token) {
                term.write('\x1b[31m[ERROR] No token provided in URL.\x1b[0m\r\n');
                return;
            }

            // Establish WebSocket
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws?token=${token}`;
            const ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                // Send initial size
                const size = { cols: term.cols, rows: term.rows };
                ws.send(JSON.stringify({ type: 'resize', ...size }));
            };

            ws.onmessage = (event) => {
                if (typeof event.data === 'string') {
                    term.write(event.data);
                } else if (event.data instanceof Blob) {
                    const reader = new FileReader();
                    reader.onload = () => {
                        term.write(new Uint8Array(reader.result));
                    };
                    reader.readAsArrayBuffer(event.data);
                }
            };

            ws.onclose = () => {
                term.write('\r\n\x1b[31m[SYSWARDEN] Connection closed.\x1b[0m\r\n');
            };

            ws.onerror = (error) => {
                term.write('\r\n\x1b[31m[SYSWARDEN] WebSocket Error.\x1b[0m\r\n');
            };

            // Handle user input
            term.onData(data => {
                if (ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'input', data: data }));
                }
            });

            // Handle resizing
            window.addEventListener('resize', () => {
                fitAddon.fit();
                if (ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
                }
            });
        });
    </script>
</body>
</html>
