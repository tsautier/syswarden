name: SysWarden Builder and Packager

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
    # paths removed to allow tags


  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-package:
    name: Compile and Build Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26.5'
          cache-dependency-path: 'go.work.sum'

      - name: Compile Universal Script
        run: pwsh -File ./build.ps1

      - name: Extract Version from Config
        id: version
        run: |
          # Parse the version dynamically from the native Go config
          VERSION=$(grep -oP 'Version = "v\K[0-9\.]+' src/core/syswarden-cli/pkg/system/upgrade.go || echo "0.0.0")
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Set up Ruby for FPM
        uses: ruby/setup-ruby@6e5d382445ae5590b7449d8b3bc8cb1c2c27f617 # v1.317.0
        with:
          ruby-version: '3.2'

      - name: Install FPM and RPM build tools
        run: |
          # Install Effing Package Management and RPM requirements without docs for speed
          sudo apt-get update
          sudo apt-get install -y rpm
          gem install --no-document fpm

      - name: Prepare Staging Environment (AMD64)
        run: |
          # Create standard Linux filesystem hierarchy for the deployment package
          mkdir -p staging/opt/syswarden/bin
          mkdir -p staging/usr/local/bin

          # Copy the unattended configuration

          # Copy syswarden-cli, syswarden-core and syswarden-tui binaries from dist/
          mkdir -p staging/opt/syswarden/bin
          if [ -f dist/bin/syswarden-cli ]; then
            cp dist/bin/syswarden-cli staging/opt/syswarden/bin/
            chmod 750 staging/opt/syswarden/bin/syswarden-cli
          fi

          if [ -f dist/bin/syswarden-core ]; then
            cp dist/bin/syswarden-core staging/opt/syswarden/bin/
            cp dist/signatures.json staging/opt/syswarden/
            chmod 750 staging/opt/syswarden/bin/syswarden-core
          fi
          
          if [ -f dist/bin/syswarden-tui ]; then
            cp dist/bin/syswarden-tui staging/opt/syswarden/bin/
            chmod 750 staging/opt/syswarden/bin/syswarden-tui
          fi

          # Apply strict execution permissions (Root execution only)
          chmod 640 staging/opt/syswarden/signatures.json

          # Create a symlink for global execution from the terminal (Routing to Go CLI)
          ln -s /opt/syswarden/bin/syswarden-cli staging/usr/local/bin/syswarden
          ln -s /opt/syswarden/bin/syswarden-tui staging/usr/local/bin/syswarden-tui

      - name: Prepare Staging Environment (ARM64)
        run: |
          mkdir -p staging_arm64/opt/syswarden/bin
          mkdir -p staging_arm64/usr/local/bin

          if [ -f dist/linux-arm64/bin/syswarden-cli ]; then
            cp dist/linux-arm64/bin/syswarden-cli staging_arm64/opt/syswarden/bin/
            chmod 750 staging_arm64/opt/syswarden/bin/syswarden-cli
          fi

          if [ -f dist/linux-arm64/bin/syswarden-core ]; then
            cp dist/linux-arm64/bin/syswarden-core staging_arm64/opt/syswarden/bin/
            cp dist/linux-arm64/signatures.json staging_arm64/opt/syswarden/
            chmod 750 staging_arm64/opt/syswarden/bin/syswarden-core
          fi
          
          if [ -f dist/linux-arm64/bin/syswarden-tui ]; then
            cp dist/linux-arm64/bin/syswarden-tui staging_arm64/opt/syswarden/bin/
            chmod 750 staging_arm64/opt/syswarden/bin/syswarden-tui
          fi

          chmod 640 staging_arm64/opt/syswarden/signatures.json

          ln -s /opt/syswarden/bin/syswarden-cli staging_arm64/usr/local/bin/syswarden
          ln -s /opt/syswarden/bin/syswarden-tui staging_arm64/usr/local/bin/syswarden-tui

      - name: Build Debian Package (.deb)
        run: |
          cat << 'EOF' > postinst.sh
          #!/bin/sh
          export SYSWARDEN_PKG_INSTALL=1
          ln -sf /opt/syswarden/bin/syswarden-cli /usr/local/bin/syswarden
          ln -sf /opt/syswarden/bin/syswarden-tui /usr/local/bin/syswarden-tui

          # Install Bash Autocompletion
          mkdir -p /etc/bash_completion.d
          /opt/syswarden/bin/syswarden-cli completion bash > /etc/bash_completion.d/syswarden 2>/dev/null || true

          # Force Bash Autocompletion on Debian/Ubuntu minimal images
          if [ -f /etc/debian_version ] && [ -f /root/.bashrc ]; then
              if ! grep -qE "^[[:space:]]*\.[[:space:]]+/etc/bash_completion" /root/.bashrc; then
                  echo "" >> /root/.bashrc
                  echo "# SysWarden Auto-Completion Hook" >> /root/.bashrc
                  echo "if [ -f /etc/bash_completion ] && ! shopt -oq posix; then" >> /root/.bashrc
                  echo "    . /etc/bash_completion" >> /root/.bashrc
                  echo "fi" >> /root/.bashrc
              fi
          fi

          # RPM Upgrade ($1 = 2) or DEB Upgrade ($1 = configure && $2 != "")
          if [ "$1" = "2" ] || [ "$1" = "configure" -a -n "$2" ]; then
              sed -i 's|ReadWritePaths=/var/lib/syswarden /var/log/syswarden /run /opt/syswarden$|ReadWritePaths=/var/lib/syswarden /var/log/syswarden /run /opt/syswarden /etc/syswarden/lists|g' /etc/systemd/system/syswarden-core.service || true
              systemctl daemon-reload
              /opt/syswarden/bin/syswarden-cli reload
              systemctl enable syswarden-firewall || true
              systemctl restart syswarden-firewall || true
              systemctl restart syswarden-core || true
          # RPM Install ($1 = 1) or DEB Install ($1 = configure && $2 == "")
          elif [ "$1" = "1" ] || [ "$1" = "configure" ]; then
              /opt/syswarden/bin/syswarden-cli install
              systemctl restart syswarden-core || true
          fi
          EOF

          cat << 'EOF' > postrm.sh
          #!/bin/sh
          # RPM Uninstall ($1 = 0) or DEB Uninstall/Purge
          if [ "$1" = "0" ] || [ "$1" = "remove" ] || [ "$1" = "purge" ]; then
            rm -f /usr/local/bin/syswarden
            rm -f /usr/local/bin/syswarden-tui
            rm -rf /opt/syswarden
            rm -rf /etc/syswarden
          fi
          EOF

          cat << 'EOF' > prerm.sh
          #!/bin/sh
          # RPM Uninstall ($1 = 0) or DEB Uninstall/Purge
          if [ "$1" = "0" ] || [ "$1" = "remove" ] || [ "$1" = "purge" ]; then
              systemctl stop syswarden-core.service || true
              systemctl disable syswarden-core.service || true
              systemctl stop syswarden-firewall.service || true
              systemctl disable syswarden-firewall.service || true
              nft delete table netdev syswarden_hw_drop || true
              nft delete table arp syswarden_arp || true
              nft delete table inet syswarden || true
              if crontab -l > /tmp/sw_cron.bak 2>/dev/null; then
                  grep -v 'syswarden-cli' /tmp/sw_cron.bak | crontab - || true
                  rm -f /tmp/sw_cron.bak
              fi
              rm -f /etc/rsyslog.d/99-syswarden-waf-bridge.conf || true
              systemctl restart rsyslog || true
          fi
          EOF

          chmod +x postinst.sh postrm.sh prerm.sh

          fpm -s dir -t deb \
            -n syswarden \
            -v ${{ env.VERSION }} \
            --vendor "SysWarden Security" \
            --maintainer "SysWarden Engineering" \
            --description "SysWarden Host-based Security Orchestrator for Linux" \
            --url "https://github.com/${{ github.repository }}" \
            --architecture amd64 \
            -d "nftables" -d "ipset" -d "curl" -d "wget" -d "rsyslog" -d "cron" -d "bash-completion" \
            --after-install postinst.sh \
            --before-remove prerm.sh \
            --after-remove postrm.sh \
            -C staging .

          fpm -s dir -t deb \
            -n syswarden \
            -v ${{ env.VERSION }} \
            --vendor "SysWarden Security" \
            --maintainer "SysWarden Engineering" \
            --description "SysWarden Host-based Security Orchestrator for Linux (ARM64)" \
            --url "https://github.com/${{ github.repository }}" \
            --architecture arm64 \
            -d "nftables" -d "ipset" -d "curl" -d "wget" -d "rsyslog" -d "cron" -d "bash-completion" \
            --after-install postinst.sh \
            --before-remove prerm.sh \
            --after-remove postrm.sh \
            -C staging_arm64 .

      - name: Build RHEL Family Package (.rpm)
        run: |
          fpm -s dir -t rpm \
            -n syswarden \
            -v ${{ env.VERSION }} \
            --vendor "SysWarden Security" \
            --maintainer "SysWarden Engineering" \
            --description "SysWarden Host-based Security Orchestrator for Linux" \
            --url "https://github.com/${{ github.repository }}" \
            --architecture x86_64 \
            -d "nftables" -d "ipset" -d "curl" -d "wget" -d "rsyslog" -d "cronie" -d "bash-completion" \
            --after-install postinst.sh \
            --before-remove prerm.sh \
            --after-remove postrm.sh \
            -C staging .

          fpm -s dir -t rpm \
            -n syswarden \
            -v ${{ env.VERSION }} \
            --vendor "SysWarden Security" \
            --maintainer "SysWarden Engineering" \
            --description "SysWarden Host-based Security Orchestrator for Linux (ARM64)" \
            --url "https://github.com/${{ github.repository }}" \
            --architecture aarch64 \
            -d "nftables" -d "ipset" -d "curl" -d "wget" -d "rsyslog" -d "cronie" -d "bash-completion" \
            --after-install postinst.sh \
            --before-remove prerm.sh \
            --after-remove postrm.sh \
            -C staging_arm64 .

      - name: Build Alpine Package (.apk)
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.47.0
          
          cat << EOF > nfpm_alpine_x86_64.yaml
          name: "syswarden"
          arch: "amd64"
          platform: "linux"
          version: "${{ env.VERSION }}"
          maintainer: "SysWarden Engineering"
          description: "SysWarden Host-based Security Orchestrator for Alpine Linux"
          vendor: "SysWarden Security"
          homepage: "https://github.com/${{ github.repository }}"
          depends:
            - nftables
            - curl
            - wget
            - rsyslog
            - bash-completion
          contents:
            - src: "./staging/opt"
              dst: "/opt"
            - src: "./staging/usr"
              dst: "/usr"
          scripts:
            postinstall: "./postinst.sh"
            preremove: "./prerm.sh"
            postremove: "./postrm.sh"
          EOF

          cat << EOF > nfpm_alpine_aarch64.yaml
          name: "syswarden"
          arch: "arm64"
          platform: "linux"
          version: "${{ env.VERSION }}"
          maintainer: "SysWarden Engineering"
          description: "SysWarden Host-based Security Orchestrator for Alpine Linux (ARM64)"
          vendor: "SysWarden Security"
          homepage: "https://github.com/${{ github.repository }}"
          depends:
            - nftables
            - curl
            - wget
            - rsyslog
            - bash-completion
          contents:
            - src: "./staging_arm64/opt"
              dst: "/opt"
            - src: "./staging_arm64/usr"
              dst: "/usr"
          scripts:
            postinstall: "./postinst.sh"
            preremove: "./prerm.sh"
            postremove: "./postrm.sh"
          EOF

          ~/go/bin/nfpm pkg --config nfpm_alpine_x86_64.yaml --packager apk --target syswarden_${{ env.VERSION }}_x86_64.apk
          ~/go/bin/nfpm pkg --config nfpm_alpine_aarch64.yaml --packager apk --target syswarden_${{ env.VERSION }}_aarch64.apk

      - name: Build FreeBSD Package (.pkg)
        run: |
          mkdir -p staging_fbsd/usr/local/syswarden/bin
          cp src/core/syswarden-core/signatures.json staging_fbsd/usr/local/syswarden/
          cp dist/freebsd/bin/* staging_fbsd/usr/local/syswarden/bin/
          chmod 750 staging_fbsd/usr/local/syswarden/bin/*
          chmod 640 staging_fbsd/usr/local/syswarden/signatures.json

          cat << 'EOF' > postinst_fbsd.sh
          #!/bin/sh
          export SYSWARDEN_PKG_INSTALL=1
          ln -sf /usr/local/syswarden/bin/syswarden-cli /usr/local/bin/syswarden
          ln -sf /usr/local/syswarden/bin/syswarden-tui /usr/local/bin/syswarden-tui
          /usr/local/bin/syswarden install
          service syswarden restart || true
          EOF

          cat << 'EOF' > postrm_fbsd.sh
          #!/bin/sh
          rm -f /usr/local/bin/syswarden
          rm -f /usr/local/bin/syswarden-tui
          rm -rf /usr/local/syswarden
          rm -rf /etc/syswarden
          EOF

          cat << 'EOF' > prerm_fbsd.sh
          #!/bin/sh
          service syswarden stop || true
          sysrc -x syswarden_enable || true
          pfctl -t syswarden_blacklist -T kill || true
          pfctl -t syswarden_blacklist6 -T kill || true
          pfctl -t syswarden_whitelist -T kill || true
          pfctl -t banned_ips -T kill || true
          EOF
          chmod +x postinst_fbsd.sh postrm_fbsd.sh prerm_fbsd.sh

          fpm -s dir -t freebsd \
            -n syswarden \
            -v ${{ env.VERSION }} \
            --vendor "SysWarden Security" \
            --maintainer "SysWarden Engineering" \
            --description "SysWarden Host-based Security Orchestrator for FreeBSD" \
            --url "https://github.com/${{ github.repository }}" \
            --architecture amd64 \
            --after-install postinst_fbsd.sh \
            --before-remove prerm_fbsd.sh \
            --after-remove postrm_fbsd.sh \
            -C staging_fbsd .

      - name: Generate Checksums
        run: |
          # Generate SHA256 checksums for integrity verification (Supply Chain Security)
          sha256sum *.deb *.rpm *.txz *.apk > SHA256SUMS.txt

      - name: Upload Package Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: syswarden-packages-${{ env.VERSION }}
          path: |
            *.deb
            *.rpm
            *.txz
            *.apk
            SHA256SUMS.txt
          retention-days: 7
