name: OSSF Scorecard Supply Chain Security

on:
  push:
    branches: [ "main", "master" ]
  # Recommandé par l'OSSF : un scan hebdomadaire automatisé
  schedule:
    - cron: '30 2 * * 1'

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Required to upload the SARIF results to GitHub Code Scanning
      security-events: write
      # Required to publish results and get a badge
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run OSSF Scorecard analysis
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF results to Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif