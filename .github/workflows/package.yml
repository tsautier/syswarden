name: SysWarden Builder and Packager

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'build.ps1'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-package:
    name: Compile and Build Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: Compile Universal Script
        run: pwsh -File ./build.ps1

      - name: Extract Version from Config
        id: version
        run: |
          # Parse the version dynamically from the native Go config
          VERSION=$(grep -oP 'Version = "v\K[0-9\.]+' src/core/syswarden-cli/pkg/system/upgrade.go || echo "0.0.0")
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Set up Ruby for FPM
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1.314.0
        with:
          ruby-version: '3.2'

      - name: Install FPM and RPM build tools
        run: |
          # Install Effing Package Management and RPM requirements without docs for speed
          sudo apt-get update
          sudo apt-get install -y rpm
          gem install --no-document fpm

      - name: Prepare Staging Environment
        run: |
          # Create standard Linux filesystem hierarchy for the deployment package
          mkdir -p staging/opt/syswarden/bin
          mkdir -p staging/usr/local/bin

          # Copy the unattended configuration

          # Copy syswarden-cli, syswarden-core and syswarden-tui binaries from dist/
          mkdir -p staging/opt/syswarden/bin
          if [ -f dist/bin/syswarden-cli ]; then
            cp dist/bin/syswarden-cli staging/opt/syswarden/bin/
            chmod 750 staging/opt/syswarden/bin/syswarden-cli
          fi

          if [ -f dist/bin/syswarden-core ]; then
            cp dist/bin/syswarden-core staging/opt/syswarden/bin/
            cp dist/signatures.json staging/opt/syswarden/
            chmod 750 staging/opt/syswarden/bin/syswarden-core
          fi
          
          if [ -f dist/bin/syswarden-tui ]; then
            cp dist/bin/syswarden-tui staging/opt/syswarden/bin/
            chmod 750 staging/opt/syswarden/bin/syswarden-tui
          fi

          # Apply strict execution permissions (Root execution only)
          chmod 640 staging/opt/syswarden/signatures.json

          # Create a symlink for global execution from the terminal (Routing to Go CLI)
          ln -s /opt/syswarden/bin/syswarden-cli staging/usr/local/bin/syswarden
          ln -s /opt/syswarden/bin/syswarden-tui staging/usr/local/bin/syswarden-tui

      - name: Build Debian Package (.deb)
        run: |
          cat << 'EOF' > prerm.sh
          #!/bin/sh
          systemctl stop syswarden-core.service || true
          systemctl disable syswarden-core.service || true
          systemctl stop syswarden-firewall.service || true
          systemctl disable syswarden-firewall.service || true
          nft delete table netdev syswarden_hw_drop || true
          nft delete table inet syswarden || true
          crontab -l | grep -v 'syswarden-cli' | crontab - || true
          rm -f /etc/rsyslog.d/99-syswarden-waf-bridge.conf || true
          systemctl restart rsyslog || true
          EOF
          chmod +x prerm.sh

          fpm -s dir -t deb \
            -n syswarden \
            -v ${{ env.VERSION }} \
            --vendor "SysWarden Security" \
            --maintainer "SysWarden Engineering" \
            --description "SysWarden Host-based Security Orchestrator for Linux" \
            --url "https://github.com/${{ github.repository }}" \
            --architecture amd64 \
            -d "nftables" -d "ipset" -d "curl" -d "wget" -d "rsyslog" \
            --before-remove prerm.sh \
            -C staging .

      - name: Build RHEL Family Package (.rpm)
        run: |
          fpm -s dir -t rpm \
            -n syswarden \
            -v ${{ env.VERSION }} \
            --vendor "SysWarden Security" \
            --maintainer "SysWarden Engineering" \
            --description "SysWarden Host-based Security Orchestrator for Linux" \
            --url "https://github.com/${{ github.repository }}" \
            --architecture x86_64 \
            -d "nftables" -d "ipset" -d "curl" -d "wget" -d "rsyslog" \
            --before-remove prerm.sh \
            -C staging .

      - name: Generate Checksums
        run: |
          # Generate SHA256 checksums for integrity verification (Supply Chain Security)
          sha256sum *.deb *.rpm > SHA256SUMS.txt

      - name: Upload Package Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: syswarden-packages-${{ env.VERSION }}
          path: |
            *.deb
            *.rpm
            SHA256SUMS.txt
          retention-days: 7